<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Claculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .container {
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #output {
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>
    <h1>Grade Calculator</h1>
    <label>Enter your score: </label>
    <input type="text" id="score">
    <button onclick="calc()">Cick to see Grade</button>
    <p id="output"></p>
</body>

</html>
<script>

    let score = document.getElementById('score')
    let output = document.getElementById('output')

    function calc() {
        let grade
        let scorevalue = score.value.trim()

        if (scorevalue === '') {
            alert('Input field is mandatory')
        } else if (isNaN(scorevalue)) {
            alert('Score must be a number')
        } else if (Number(scorevalue) < 0 || Number(scorevalue) > 100) {
            alert('Score must be betewwn 1 and 10')

            if (scorevalue >= 80) {
                grade = 'A';
            } else if (scorevalue >= 70) {
                grade = 'B';
            } else if (scorevalue >= 60) {
                grade = 'C';
            } else if (scorevalue >= 50) {
                grade = 'D';
            } else {
                grade = 'E';
            }

            output.innerHTML = `Your Grade is ${grade}`
